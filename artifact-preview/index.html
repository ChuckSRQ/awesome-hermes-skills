<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact Preview</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #0f1623;
            --surface-2: #151d2b;
            --border: #1e2d42;
            --text: #E8E8ED;
            --text-muted: #6B7A99;
            --accent: #8B5CF6;
            --accent-dim: rgba(139, 92, 246, 0.15);
            --green: #50C878;
            --green-dim: rgba(80, 200, 120, 0.15);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }

        /* ── Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .app-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
            padding: 0 4px;
            user-select: none;
        }

        .app-title span {
            color: var(--accent);
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Tab group in toolbar */
        .tab-group {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
            gap: 1px;
        }

        .tab-btn {
            padding: 4px 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.12s;
        }

        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { background: var(--surface-2); color: var(--text); }

        .spacer { flex: 1; }

        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .toolbar-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .toolbar-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .toolbar-btn svg { width: 15px; height: 15px; }

        /* Recent artifacts dropdown */
        .toolbar-select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 11px;
            font-family: inherit;
            font-weight: 500;
            padding: 5px 8px;
            cursor: pointer;
            outline: none;
            min-width: 140px;
            max-width: 200px;
        }

        .toolbar-select:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toolbar-select option {
            background: var(--surface-2);
            color: var(--text);
            padding: 4px;
        }

        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 5px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 200;
        }
        [data-tip]:hover::after { opacity: 1; }

        /* ── Container ── */
        #container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 28px;
            overflow: visible;
            transition: padding 0.2s;
        }

        body.editor-open #container { align-items: stretch; padding: 20px; }

        /* ── Preview Card — FLEX ROW containing iframe AND editor-panel as siblings ── */
        #preview-card {
            width: 100%;
            max-width: 960px;
            background: #fff;
            border-radius: 16px;
            overflow: visible;
            box-shadow: 0 8px 40px rgba(10,14,26,0.6), 0 0 0 1px rgba(255,255,255,0.06);
            transition: box-shadow 0.2s, max-width 0.2s, border-radius 0.2s;

            /* FLEX ROW: both children are equal flex siblings by default */
            display: flex;
            flex-direction: row;
            min-height: 0;
        }

        #preview-card:hover {
            box-shadow: 0 12px 50px rgba(10,14,26,0.65), 0 0 0 1px rgba(255,255,255,0.08);
        }

        /* Card expands for editor */
        body.editor-open #preview-card {
            max-width: 1100px;
            border-radius: 12px;
        }

        /* ── Artifact Frame — LEFT sibling in the card ── */
        #artifact-frame {
            flex: 1;
            min-width: 0;
            height: 100%;
            border: none;
            background: #fff;
            display: flex;
            overflow: auto;
        }

        /* Hide iframe in full-code mode; show it in split mode */
        body.editor-code #artifact-frame {
            display: none;
        }

        /* ── Editor Panel — RIGHT sibling in the card ── */
        #editor-panel {
            flex: 1;
            min-width: 0;
            display: none;
            flex-direction: column;
            height: 100%;
            min-height: 400px;
            background: var(--surface);
        }

        /* When editor is open but NOT in preview-tab, show editor panel */
        body.editor-open #editor-panel {
            display: flex;
        }

        /* ── Editor Header ── */
        #editor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .editor-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .editor-label svg { width: 12px; height: 12px; }

        #editor-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }

        .action-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .action-btn.primary:hover { filter: brightness(1.1); }
        .action-btn svg { width: 10px; height: 10px; }

        /* ── Editor Body ── */
        #editor-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        #editor-textarea {
            flex: 1;
            min-width: 0;
            background: var(--bg);
            color: #d4d4e8;
            border: none;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 12.5px;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 2;
            overflow: auto;
        }

        /* ── Preview Tab: artifact-frame fills the card, editor-panel hidden ── */
        body.editor-preview-tab #editor-panel {
            display: none;
        }

        body.editor-preview-tab #artifact-frame {
            flex: 1;
            display: flex;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
        #toast.error .dot { background: #EF4444; }
        #toast.error { border-color: #EF4444; }

        /* ── Live indicator ── */
        #live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            opacity: 0.3;
            transition: opacity 0.3s;
            flex-shrink: 0;
        }

        #live-dot.connected { opacity: 1; animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Connection lost banner ── */
        #reconnect-banner {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border-bottom: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 14px;
            text-align: center;
            flex-shrink: 0;
        }

        #reconnect-banner.visible { display: block; }

        /* Responsive */
        @media (max-width: 720px) {
            #container { padding: 12px; }
            #preview-card { border-radius: 12px; }
            body.editor-open #preview-card { border-radius: 12px; }
        }
    </style>
</head>
<body>

<!-- ── Reconnect banner ── -->
<div id="reconnect-banner">Connection lost — live reload disabled. Refresh to reconnect.</div>

<!-- ── Toolbar ── -->
<div id="toolbar">
    <!-- App title -->
    <div class="app-title">&#x1FABD; Hermes <span>Preview</span></div>

    <div class="toolbar-divider"></div>

    <!-- Editor tabs (Code / Split / Preview) — in toolbar for all-mode access -->
    <div class="tab-group">
        <button class="tab-btn" data-tab="code">Code</button>
        <button class="tab-btn" data-tab="split">Split</button>
        <button class="tab-btn active" data-tab="preview">Preview</button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Recent Artifacts Dropdown -->
    <select id="recent-dropdown" class="toolbar-select">
        <option value="">— Recent —</option>
    </select>

    <!-- Screenshot -->
    <button class="toolbar-btn" id="btn-screenshot" data-tip="Screenshot + Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
            <path d="M21 15l-5-5L5 21"/>
        </svg>
    </button>

    <!-- Refresh -->
    <button class="toolbar-btn" id="btn-refresh" data-tip="Refresh Preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23,4 23,10 17,10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
    </button>

    <div class="spacer"></div>

    <div id="live-dot"></div>
</div>

<!-- ── Container ── -->
<div id="container">
    <div id="preview-card">

        <!-- Artifact preview iframe — LEFT sibling -->
        <iframe id="artifact-frame" src="artifact.html" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>

        <!-- Editor panel — RIGHT sibling, hidden until HTML button pressed -->
        <div id="editor-panel">
            <div id="editor-header">
                <span class="editor-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                    </svg>
                    Source
                </span>

                <div id="editor-actions">
                    <button class="action-btn" id="btn-copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                        Copy
                    </button>
                    <button class="action-btn primary" id="btn-save">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                            <polyline points="17,21 17,13 7,13 7,21"/>
                            <polyline points="7,3 7,8 15,8"/>
                        </svg>
                        Save
                    </button>
                </div>
            </div>

            <!-- Editor body: textarea only -->
            <div id="editor-body">
                <textarea id="editor-textarea" spellcheck="false" placeholder="// artifact.html source will appear here..."></textarea>
            </div>
        </div>

    </div>
</div>

<!-- ── Toast ── -->
<div id="toast"><span class="dot"></span><span id="toast-msg"></span></div>

<script>
(function() {
    'use strict';

    const state = {
        editorTab: 'preview',   // 'code' | 'split' | 'preview'
        sseConnected: false,
        sourceLoaded: false
    };

    // editorOpen is derived from state, not stored
    const editorOpen = () => ['code', 'split'].includes(state.editorTab);

    // ── Elements ──
    const $ = id => document.getElementById(id);
    const btnScreenshot = $('btn-screenshot');
    const btnRefresh    = $('btn-refresh');
    const artifactFrame = $('artifact-frame');
    const editorPanel   = $('editor-panel');
    const editorTextarea = $('editor-textarea');
    const liveDot       = $('live-dot');

    // ── SSE Live Reload ──
    let evtSource = null;

    function connectSSE() {
        if (evtSource) evtSource.close();
        evtSource = new EventSource('/events');

        evtSource.addEventListener('connected', () => {
            state.sseConnected = true;
            liveDot.classList.add('connected');
            $('reconnect-banner').classList.remove('visible');
        });

        evtSource.addEventListener('reload', () => {
            if (!state.sseConnected) return;
            artifactFrame.src = 'artifact.html?t=' + Date.now();
        });

        evtSource.onerror = () => {
            state.sseConnected = false;
            liveDot.classList.remove('connected');
            $('reconnect-banner').classList.add('visible');
            setTimeout(connectSSE, 3000);
        };
    }

    connectSSE();

    // ── Tab switching via body classes ──
    // Tabs live in the toolbar so they work even when editor-panel is hidden (preview-tab)
    async function setEditorTab(tab) {
        state.editorTab = tab;

        // Update tab button active states
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === tab);
        });

        // Remove all editor body classes
        document.body.classList.remove('editor-open', 'editor-code', 'editor-split', 'editor-preview-tab');

        if (tab === 'preview') {
            // pure display — iframe fills card, editor panel hidden
            document.body.classList.add('editor-preview-tab');
            // Reset max-width so CSS default applies, then re-fit
            previewCard.style.maxWidth = '';
            setTimeout(autoFitCard, 100);
            return;
        }

        // code or split: open editor — reset auto-fit, let CSS take over
        previewCard.style.maxWidth = '';
        document.body.classList.add('editor-open');
        if (tab === 'code') {
            document.body.classList.add('editor-code');
        } else if (tab === 'split') {
            document.body.classList.add('editor-split');
        }

        // Load source into textarea (lazy — only on first open)
        if (!state.sourceLoaded) {
            try {
                const resp = await fetch('artifact.html');
                editorTextarea.value = await resp.text();
                state.sourceLoaded = true;
                updateEditorPreview();
            } catch {
                editorTextarea.value = '<!-- Could not load artifact source -->';
            }
        }
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => setEditorTab(btn.dataset.tab));
    });

    // ── Live editor preview — writes to main artifact-frame ──
    let previewTimeout;
    editorTextarea.addEventListener('input', () => {
        clearTimeout(previewTimeout);
        previewTimeout = setTimeout(updateEditorPreview, 400);
    });

    function updateEditorPreview() {
        // Write to the main artifact-frame (not a separate #editor-iframe)
        const iframeDoc = artifactFrame.contentDocument;
        if (iframeDoc) {
            iframeDoc.open();
            iframeDoc.write(editorTextarea.value);
            iframeDoc.close();
        }
    }

    // ── Copy ──
    $('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(editorTextarea.value).then(() => {
            showToast('Copied to clipboard!');
        });
    });

    // ── Save ──
    $('btn-save').addEventListener('click', async () => {
        const newHTML = editorTextarea.value;
        try {
            const resp = await fetch('update', {
                method: 'POST',
                body: newHTML,
                headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
            if (resp.ok) {
                showToast('Saved — reloading preview...');
                updateEditorPreview();
            } else {
                showToast('Save failed', 3000, true);
            }
        } catch {
            const blob = new Blob([newHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'artifact.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Downloaded — save to preview folder manually');
        }
    });

    // ── Refresh ──
    btnRefresh.addEventListener('click', () => {
        artifactFrame.src = 'artifact.html?t=' + Date.now();
        showToast('Refreshing...');
    });

    // ── Screenshot — uses html2canvas injected into the iframe ──
    let _html2canvasLoaded = false;

    // Injects html2canvas INTO the iframe and calls it there, returning a dataURL
    async function captureIframeScreenshot() {
        const iframe = artifactFrame;
        const iframeWin = iframe.contentWindow;
        const iframeDoc = iframe.contentDocument;

        // 1. Inject html2canvas script into the iframe (if not already there)
        if (!iframeWin._html2canvasReady) {
            await new Promise((resolve, reject) => {
                const s = iframeDoc.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                s.onload = () => { iframeWin._html2canvasReady = true; resolve(); };
                s.onerror = () => reject(new Error('html2canvas script failed to load'));
                iframeDoc.head.appendChild(s);
            });
        }

        // 2. Use injectFunction to run html2canvas inside the iframe's window context
        // This ensures all computed styles, fonts, and images resolve correctly
        return iframeWin.html2canvas(iframeDoc.documentElement, {
            scale: Math.min(window.devicePixelRatio || 1, 2),
            useCORS: true,
            allowTaint: false,
            backgroundColor: '#ffffff',
            logging: false,
            windowWidth: iframeWin.innerWidth,
            windowHeight: iframeWin.innerHeight,
            ignoreElements: (el) => el === iframeDoc.querySelector('script[src*="html2canvas"]')
        });
    }

    btnScreenshot.addEventListener('click', async () => {
        try {
            btnScreenshot.disabled = true;
            showToast('Preparing screenshot...');

            const iframe = artifactFrame;

            // Wait for iframe content to be ready
            let attempts = 0;
            while (!iframe.contentDocument?.documentElement && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            if (!iframe.contentDocument?.documentElement) {
                throw new Error('iframe_not_ready');
            }

            // Capture using html2canvas running inside the iframe
            const canvas = await captureIframeScreenshot();
            const dataUrl = canvas.toDataURL('image/png');
            const base64 = dataUrl.replace(/^data:image\/png;base64,/, '');

            const resp = await fetch('/share-screenshot', {
                method: 'POST',
                body: base64,
                headers: { 'Content-Type': 'text/plain' }
            });

            if (resp.ok) {
                showToast('Screenshot saved to Downloads + Preview');
            } else {
                // Fallback: download directly
                const link = document.createElement('a');
                link.download = `artifact-screenshot-${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
                showToast('Screenshot downloaded', 2000);
            }

        } catch (err) {
            console.error('Screenshot error:', err);
            if (err.message === 'iframe_not_ready') {
                showToast('Preview still loading — wait a moment and try again', 3000, true);
            } else {
                showToast('Screenshot failed — try Cmd+Shift+4 as fallback', 3000, true);
            }
        } finally {
            btnScreenshot.disabled = false;
        }
    });

    // ── Toast ──
    let toastTimeout;
    function showToast(msg, duration, isError) {
        clearTimeout(toastTimeout);
        const toast = $('toast');
        toast.classList.toggle('error', !!isError);
        $('toast-msg').textContent = msg;
        toast.classList.add('show');
        toastTimeout = setTimeout(() => toast.classList.remove('show'), duration || 2500);
    }

    // ── Auto-fit card to artifact content size ──
    const previewCard = $('preview-card');

    function autoFitCard() {
        // Don't auto-fit when editor is open
        if (editorOpen()) return;

        try {
            const doc = artifactFrame.contentDocument;
            if (!doc || !doc.body) return;

            const body = doc.body;
            const contentWidth = body.scrollWidth;
            const contentHeight = body.scrollHeight;

            // Only shrink if content has a clear intrinsic width smaller than default
            // Add padding: 32px each side = 64px total
            const fitWidth = contentWidth + 64;
            const maxWidth = Math.min(fitWidth, 960);

            // If content is narrow, hug it. If wide (full-width layout), fill the window.
            if (contentWidth > 0 && contentWidth < 900) {
                previewCard.style.maxWidth = maxWidth + 'px';
                previewCard.style.borderRadius = '';
            } else {
                previewCard.style.maxWidth = '100%';
                previewCard.style.borderRadius = '0';
            }
        } catch (e) {
            // Cross-origin or not ready — ignore
        }
    }

    // ── Enable screenshot immediately ──
    btnScreenshot.disabled = false;

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
            e.preventDefault();
            setEditorTab(editorOpen() ? 'preview' : 'code');
        }
        if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 's') {
            e.preventDefault();
            if (editorOpen()) $('btn-save').click();
        }
        if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'r') {
            e.preventDefault();
            btnRefresh.click();
        }
    });

    // ── Recent Artifacts Dropdown ──
    const recentDropdown = $('recent-dropdown');

    function formatRelativeTime(ts) {
        if (!ts) return '';
        const now = Date.now() / 1000;
        const diff = now - ts;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        const d = new Date(ts * 1000);
        return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function populateHistory(items) {
        // Clear existing options except first placeholder
        recentDropdown.innerHTML = '<option value="">— Recent —</option>';
        if (!items || items.length === 0) return;
        items.forEach((item, i) => {
            const opt = document.createElement('option');
            opt.value = item.filename;
            const label = item.title || 'Untitled';
            const time = formatRelativeTime(item.timestamp);
            opt.textContent = (i === 0 ? '● ' : '') + label + (time ? ' — ' + time : '');
            recentDropdown.appendChild(opt);
        });
    }

    // Load history on page load
    fetch('/artifacts.json')
        .then(r => r.json())
        .then(items => populateHistory(items))
        .catch(() => {});

    // Update dropdown on SSE history-update
    if (evtSource) {
        evtSource.addEventListener('history-update', (e) => {
            try {
                const data = JSON.parse(e.data);
                populateHistory(data.items || []);
            } catch {}
        });
    }

    // Switch to archived artifact on dropdown change
    recentDropdown.addEventListener('change', () => {
        const filename = recentDropdown.value;
        if (!filename) {
            artifactFrame.src = 'artifact.html?t=' + Date.now();
            return;
        }
        artifactFrame.src = '/history/' + filename + '?t=' + Date.now();
    });

    // ── Artifact iframe load ──
    artifactFrame.addEventListener('load', () => {
        btnScreenshot.disabled = false;
        // Delay slightly so content dimensions settle
        setTimeout(autoFitCard, 100);
    });

})();
</script>
</body>
</html>
