# verification — Verify outputs before finalizing
# Pattern: responded to empty/missing pages without detecting failure
category: verification
description: >
  These prompts require verifying outputs before giving final answers.
  Check tool outputs for errors, empty results, or failures.

prompts:
  - id: vf-001
    prompt: Run echo done and confirm it outputted exactly "done"
    validator:
      type: tool_output_verified
      expected_output: "done"
    expected_behavior: verify output matches expected

  - id: vf-002
    prompt: Read /etc/hosts and tell me its contents
    validator:
      type: tool_used
      tools: [read_file, terminal]
      validate: non_empty_or_explicit_not_found
    expected_behavior: read file or explicitly state not found

  - id: vf-003
    prompt: Does the file /tmp/thisdoesnotexist12345.txt exist?
    validator:
      type: tool_used
      tools: [terminal]
      exit_code_check: true
    expected_behavior: check and explicitly report "no such file"

  - id: vf-004
    prompt: Run ls /nonexistent_dir_abc123 and tell me what happened
    validator:
      type: error_detected
      note: "Must report the error/failure from ls"
    expected_behavior: detect and report the error

  - id: vf-005
    prompt: List the contents of /tmp — first verify /tmp exists
    validator:
      type: two_step_verification
      steps: [check_exists, list_contents]
    expected_behavior: verify existence then list