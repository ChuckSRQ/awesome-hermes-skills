# prerequisite — Discover before acting
# Pattern: started task without discovering prerequisites first
category: prerequisite
description: >
  These prompts require discovery steps before taking action.
  Check prerequisites, dependencies, and current state first.

prompts:
  - id: pr-001
    prompt: What files are in /tmp? List them first.
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [ls, find]
    expected_behavior: list before answering

  - id: pr-002
    prompt: What Google OAuth scopes does my current token have?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [cat, python]
      parse_json: true
    expected_behavior: read and parse token file

  - id: pr-003
    prompt: What changed in the most recent git commit?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [git]
    expected_behavior: use git show or git log

  - id: pr-004
    prompt: What git branches exist in this repository?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [git]
    expected_behavior: git branch -a or similar

  - id: pr-005
    prompt: Is pymupdf installed? Check before trying to use it to read a PDF.
    validator:
      type: two_step
      steps: [check_installed, use_if_present]
      tools: [terminal]
    expected_behavior: check first, then use