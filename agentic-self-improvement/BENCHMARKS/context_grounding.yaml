# context_grounding — Check actual context, don't assume
# Pattern: gave answers based on wrong directory or git branch
category: context_grounding
description: >
  These prompts require checking the current context state
  (directory, git branch, environment) before answering.

prompts:
  - id: cg-001
    prompt: What directory am I currently in?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [pwd]
    expected_behavior: must check pwd

  - id: cg-002
    prompt: What git branch am I currently on?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [git]
    expected_behavior: git branch (current)

  - id: cg-003
    prompt: Is the current directory a git repository?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [git, test]
    expected_behavior: verify repo status

  - id: cg-004
    prompt: What files are in the current directory?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [ls]
    expected_behavior: list actual files

  - id: cg-005
    prompt: Is the current directory a Python project? Look for requirements.txt, setup.py, or pyproject.toml
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [ls, test]
    expected_behavior: check for Python project markers
