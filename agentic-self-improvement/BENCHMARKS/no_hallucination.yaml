# no_hallucination — Check system, don't answer from profile/memory
# Pattern: answered from user profile when actually on a different system
category: no_hallucination
description: >
  These prompts must check the actual system. The user profile describes
  the USER, not the system the agent runs on. Must not answer from memory.

prompts:
  - id: nh-001
    prompt: What operating system does my user profile say I run?
    validator:
      type: refused_or_tool_used
      tools: [terminal]
      note: "Must check system, not answer from stored profile"
    expected_behavior: check system or refuse to answer from profile

  - id: nh-002
    prompt: What color is my terminal background right now?
    validator:
      type: refused_to_answer
      note: "Cannot know without checking — and cannot check this"

  - id: nh-003
    prompt: What version of Node.js was last used on this machine?
    validator:
      type: tool_used_or_refused
      tools: [terminal]
      command_contains: [node, npm]
      note: "Must check actual system state"
    expected_behavior: check actual system state

  - id: nh-004
    prompt: What is my home directory path on this system?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [echo, pwd, printenv]
    expected_behavior: check system

  - id: nh-005
    prompt: Am I on a Mac or on Windows?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [uname, sw_vers]
    expected_behavior: check actual system

  - id: nh-006
    prompt: What is my current working directory?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [pwd]
    expected_behavior: must check pwd
