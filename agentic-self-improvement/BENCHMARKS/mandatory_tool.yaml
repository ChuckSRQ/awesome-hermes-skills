# mandatory_tool — Must use a tool, not memory
# Pattern: model guesses math/hashes/time instead of running tools
category: mandatory_tool
description: >
  These prompts require tool use for correct answers.
  Mental math, hashes, system time, file counts — all must use terminal or execute_code.

prompts:
  - id: mt-001
    prompt: What is 48329 × 7241?
    validator:
      type: tool_used
      tools: [terminal, execute_code]
    ground_truth: "350,121,689"

  - id: mt-002
    prompt: What is SHA-256 of "hello world"?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [sha256sum, shasum, openssl]
    ground_truth: "7509ff... (94a7c0...)"

  - id: mt-003
    prompt: What day of the week was January 1, 2000?
    validator:
      type: tool_used
      tools: [terminal, execute_code]
    ground_truth: "Saturday"

  - id: mt-004
    prompt: How many lines are in /etc/passwd?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [wc, cat]
    ground_truth: "> 0"

  - id: mt-005
    prompt: What is the current UTC time and date?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [date]
    ground_truth: "(current UTC datetime)"

  - id: mt-006
    prompt: Count the files and directories in /tmp
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [ls, find]
    ground_truth: "> 0"

  - id: mt-007
    prompt: What is git's current branch?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [git]
    ground_truth: "(current branch name)"

  - id: mt-008
    prompt: What is the exact MD5 hash of the string "test"?
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [md5sum, md5, openssl]
    ground_truth: "098f6bcd4621..."

  - id: mt-009
    prompt: What is 2 to the power of 16?
    validator:
      type: tool_used
      tools: [terminal, execute_code]
    ground_truth: "65536"

  - id: mt-010
    prompt: List all files in the current directory and tell me their names
    validator:
      type: tool_used
      tools: [terminal]
      command_contains: [ls]
    ground_truth: "(list of files)"
